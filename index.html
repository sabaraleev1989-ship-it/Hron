<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>СК СКОРПИОН 3.0</title>
    <style>
        :root {
            --accent: #d1d1d1; /* Серебристый из логотипа */
            --red: #e30613;    /* Красный из флага */
            --blue: #0055a4;   /* Синий из флага */
            --glass: rgba(0, 0, 0, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            /* Фон - твой логотип */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('logo.png');
            background-size: cover;
            background-position: center;
            color: white;
            overflow: hidden;
        }

        .calc-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            border: 2px solid #444;
            width: 85%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        h2 { font-size: 20px; letter-spacing: 2px; margin: 0; color: var(--accent); text-transform: uppercase; }
        .sub { font-size: 10px; color: #888; margin-bottom: 25px; }

        .control { margin-bottom: 30px; text-align: left; }
        .label-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; font-size: 14px; }
        .val-badge { background: #333; padding: 2px 10px; border-radius: 5px; color: var(--accent); }

        /* Кастомные ползунки со скорпионами */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, var(--red), var(--blue), white);
            border-radius: 2px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 35px;
            height: 35px;
            /* Здесь картинка скорпиона для ползунка */
            background: url('scorp-icon.png') no-repeat center;
            background-size: contain;
            cursor: pointer;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
            transition: transform 0.2s;
        }

        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.2) rotate(-10deg);
        }

        .results { display: flex; gap: 15px; margin-top: 20px; }
        .res-item {
            flex: 1;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid #444;
        }

        .num { display: block; font-size: 26px; font-weight: 900; }
        .j-color { color: var(--red); }
        .v-color { color: var(--blue); }
        .desc { font-size: 10px; color: #888; text-transform: uppercase; margin-top: 5px; }

        .footer { margin-top: 30px; font-size: 12px; font-weight: bold; color: #666; letter-spacing: 3px; }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>SCORPION</h2>
    <div class="sub">СТРАЙКБОЛЬНАЯ КОМАНДА Г. СОЧИ</div>

    <div class="control">
        <div class="label-row"><span>ВЕС</span> <span class="val-badge" id="wv">0.30 г</span></div>
        <input type="range" id="w" min="0.12" max="0.50" step="0.01" value="0.30" oninput="update()">
    </div>

    <div class="control">
        <div class="label-row"><span>М/С</span> <span class="val-badge" id="sv">120</span></div>
        <input type="range" id="s" min="60" max="200" step="1" value="120" oninput="update()">
    </div>

    <div class="results">
        <div class="res-item">
            <span class="num j-color" id="jr">2.16</span>
            <span class="desc">ДЖОУЛЯ</span>
        </div>
        <div class="res-item">
            <span class="num v-color" id="vr">147</span>
            <span class="desc">М/С (0.20г)</span>
        </div>
    </div>

    <div class="footer">СК СКОРПИОН 3.0</div>
</div>

<script>
    function update() {
        const m = document.getElementById('w').value;
        const v = document.getElementById('s').value;
        
        document.getElementById('wv').innerText = m + ' г';
        document.getElementById('sv').innerText = v;

        const joules = (m / 1000 * v * v / 2).toFixed(2);
        const v02 = Math.sqrt((joules * 2) / 0.0002).toFixed(0);

        document.getElementById('jr').innerText = joules;
        document.getElementById('vr').innerText = v02;
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>
