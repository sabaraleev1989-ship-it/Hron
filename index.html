<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>ХРОН СКОРПИОН</title>
    <style>
        :root { --silver: #c0c0c2; --red: #e30613; --blue: #0055a4; }
        body { margin: 0; background: #000; height: 100vh; display: flex; flex-direction: column; align-items: center; font-family: -apple-system, sans-serif; overflow: hidden; color: white; }
        .header-logo { flex: 1; width: 85%; background: url('logo.png') no-repeat center bottom; background-size: contain; margin: 15px 0; filter: drop-shadow(0 0 15px rgba(192,192,194,0.5)); }
        .quick-weight { display: flex; gap: 8px; width: 90%; margin-bottom: 15px; }
        .weight-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--silver); color: var(--silver); padding: 10px 0; flex: 1; border-radius: 12px; font-weight: bold; font-size: 14px; }
        .container { width: 90%; background: #141414; padding: 20px; border-radius: 30px 30px 0 0; border: 1px solid rgba(192,192,194,0.2); text-align: center; }
        .input-block { margin-bottom: 18px; text-align: left; }
        .label-row { display: flex; justify-content: space-between; margin-bottom: 8px; color: var(--silver); font-size: 12px; font-weight: bold; }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 6px; background: linear-gradient(to right, var(--red), var(--blue), #fff); border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%; background: var(--silver); border: 2px solid #000; }
        .results { display: flex; gap: 10px; margin-top: 10px; }
        .res-card { flex: 1; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; border: 1px solid rgba(192,192,194,0.1); }
        .val { display: block; font-size: 28px; font-weight: 900; }
        .j-color { color: var(--red); } .v-color { color: var(--blue); }
        .unit { font-size: 10px; color: var(--silver); text-transform: uppercase; opacity: 0.6; }
        .footer { margin-top: 15px; font-size: 9px; color: #444; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="header-logo"></div>
    <div class="quick-weight">
        <button class="weight-btn" onclick="setW(0.20)">0.20</button>
        <button class="weight-btn" onclick="setW(0.25)">0.25</button>
        <button class="weight-btn" onclick="setW(0.28)">0.28</button>
        <button class="weight-btn" onclick="setW(0.30)">0.30</button>
        <button class="weight-btn" onclick="setW(0.32)">0.32</button>
    </div>
    <div class="container">
        <div class="input-block">
            <div class="label-row"><span>ВЕС ШАРА</span><span id="w-val">0.30 г</span></div>
            <input type="range" id="weight" min="0.12" max="0.50" step="0.01" value="0.30" oninput="update()">
        </div>
        <div class="input-block">
            <div class="label-row"><span>СКОРОСТЬ</span><span id="s-val">120 м/с</span></div>
            <input type="range" id="speed" min="50" max="200" step="1" value="120" oninput="update()">
        </div>
        <div class="results">
            <div class="res-card"><span class="val j-color" id="joules">2.16</span><span class="unit">Джоуля</span></div>
            <div class="res-card"><span class="val v-color" id="m02">147</span><span class="unit">м/с (0.20г)</span></div>
        </div>
        <div class="footer">СК СКОРПИОН 3.0</div>
    </div>
<script>
    function setW(v) { document.getElementById('weight').value = v; update(); }
    function update() {
        const m = document.getElementById('weight').value;
        const v = document.getElementById('speed').value;
        document.getElementById('w-val').innerText = m + ' г';
        document.getElementById('s-val').innerText = v + ' м/с';
        const j = (m / 1000 * v * v / 2).toFixed(2);
        const v02 = Math.sqrt((j * 2) / 0.0002).toFixed(0);
        document.getElementById('joules').innerText = j;
        document.getElementById('m02').innerText = v02;
    }
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>
</body>
</html>
