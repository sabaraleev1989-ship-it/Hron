<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>ХРОН СКОРПИОН</title>
    <style>
        :root { 
            --silver: #c0c0c2; --red: #e30613; --blue: #0055a4; 
            --green: #2ecc71; --orange: #f39c12; --cyan: #3498db; --purple: #9b59b6; 
        }
        
        body { 
            margin: 0; background: #000; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: -apple-system, sans-serif; overflow: hidden; color: white; 
            -webkit-user-select: none;
        }

        .spacer-top { height: 10px; }
        .header-logo { 
            height: 18vh; width: 90%; 
            background: url('logo.png') no-repeat center center; 
            background-size: contain; 
            filter: drop-shadow(0 0 15px rgba(192, 192, 194, 0.4)); 
            margin-bottom: 5px;
        }

        .app-title { font-size: 18px; font-weight: 900; letter-spacing: 10px; color: white; text-transform: uppercase; margin-bottom: 5px; }

        .quick-weight { display: flex; justify-content: space-between; gap: 4px; width: 95%; margin-bottom: 10px; }
        .weight-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(192, 192, 194, 0.3); color: var(--silver); padding: 8px 0; flex: 1; border-radius: 8px; font-weight: bold; font-size: 11px; text-align: center; }

        .container { 
            width: 95%; background: #141414; padding: 15px 15px 5px; 
            border-radius: 25px 25px 0 0; border: 1px solid rgba(192, 192, 194, 0.2); 
            text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between;
        }

        .input-block { margin-bottom: 25px; text-align: left; position: relative; }
        .label-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px; color: var(--silver); font-weight: bold; }
        .label-name { font-size: 10px; opacity: 0.8; letter-spacing: 1px; }
        .label-val { font-size: 20px; color: #fff; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; outline: none; margin: 15px 0 5px; position: relative; z-index: 5; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%; background: var(--silver); border: 2px solid #000; box-shadow: 0 0 10px rgba(0,0,0,0.5); cursor: pointer; }

        /* Контейнер для штрихов */
        .ticks { 
            display: flex; justify-content: space-between; 
            width: 100%; padding: 0 14px; box-sizing: border-box;
            position: absolute; bottom: 18px; 
        }
        .ticks span { 
            width: 1px; height: 6px; background: rgba(192, 192, 194, 0.3); 
        }
        /* Длинные штрихи для основных значений */
        .ticks span.big { height: 10px; background: rgba(192, 192, 194, 0.6); }

        .range-labels { display: flex; justify-content: space-between; padding: 0 2px; margin-top: 5px; }
        .range-labels span { font-size: 9px; color: var(--silver); opacity: 0.5; width: 30px; text-align: center; }

        .status-box {
            background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px; margin: 5px 0;
            min-height: 40px; display: flex; align-items: center; justify-content: center; border: 1px dashed rgba(192,192,194,0.2);
        }
        #status-text { font-size: 10px; font-weight: bold; line-height: 1.3; text-transform: uppercase; }

        .results { display: flex; gap: 8px; flex-grow: 1; margin-top: 5px; }
        .res-card { 
            flex: 1; background: rgba(255,255,255,0.03); border-radius: 15px; 
            border: 1px solid rgba(192, 192, 194, 0.1); 
            display: flex; flex-direction: column; justify-content: center; padding: 8px;
        }
        .val { display: block; font-size: 38px; font-weight: 900; line-height: 1; }
        .j-color { color: var(--red); } 
        .v-color { color: var(--blue); }
        .unit { font-size: 10px; color: var(--silver); text-transform: uppercase; opacity: 0.6; margin-top: 5px; font-weight: bold; }
        
        .footer { font-size: 8px; color: #444; letter-spacing: 3px; text-transform: uppercase; padding: 10px 0; }
    </style>
</head>
<body>
    <div class="spacer-top"></div>
    <div class="header-logo"></div>
    <div class="app-title">ХРОН</div>
    
    <div class="quick-weight">
        <button class="weight-btn" onclick="setW(0.20)">0.20</button>
        <button class="weight-btn" onclick="setW(0.25)">0.25</button>
        <button class="weight-btn" onclick="setW(0.28)">0.28</button>
        <button class="weight-btn" onclick="setW(0.30)">0.30</button>
        <button class="weight-btn" onclick="setW(0.32)">0.32</button>
    </div>

    <div class="container">
        <div>
            <div class="input-block">
                <div class="label-row"><span class="label-name">ВЕС ШАРА</span><span id="w-val" class="label-val">0.30 г</span></div>
                <input type="range" id="weight" min="0.20" max="0.45" step="0.01" value="0.30" oninput="update(true)">
                <div class="range-labels">
                    <span>0.20</span><span>0.25</span><span>0.30</span><span>0.35</span><span>0.40</span><span>0.45</span>
                </div>
            </div>

            <div class="input-block">
                <div class="label-row"><span class="label-name">СКОРОСТЬ</span><span id="s-val" class="label-val">120 м/с</span></div>
                <div class="ticks" id="speed-ticks"></div> <input type="range" id="speed" min="50" max="220" step="1" value="120" oninput="update(true)">
                <div class="range-labels">
                    <span>50</span><span>85</span><span>120</span><span>155</span><span>190</span><span>220</span>
                </div>
            </div>

            <div class="status-box">
                <div id="status-text">Замеряемся...</div>
            </div>
        </div>
        
        <div class="results">
            <div class="res-card">
                <span class="val j-color" id="joules">2.16</span>
                <span class="unit">Дж</span>
            </div>
            <div class="res-card">
                <span class="val v-color" id="m02">147</span>
                <span class="unit">м/с (0.20)</span>
            </div>
        </div>
        
        <div class="footer">СК СКОРПИОН 3.0</div>
    </div>

<script>
    let audioCtx = null;
    let lastW = null;
    let lastS = null;

    // Генерируем штрихи для шкалы скорости (от 50 до 220 = 170 делений)
    const tickContainer = document.getElementById('speed-ticks');
    for (let i = 50; i <= 220; i++) {
        const span = document.createElement('span');
        // Делаем каждый 10-й штрих чуть ярче и длиннее
        if (i % 10 === 0) span.className = 'big';
        tickContainer.appendChild(span);
    }

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTick() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1200, audioCtx.currentTime); 
        osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.01);
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.01);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.01);
    }

    function setW(v) { 
        initAudio();
        document.getElementById('weight').value = v; 
        playTick();
        update(); 
    }

    function update(isUserAction = false) {
        const m = document.getElementById('weight').value;
        const v = document.getElementById('speed').value;
        document.getElementById('w-val').innerText = m + ' г';
        document.getElementById('s-val').innerText = v + ' м/с';
        
        const j = parseFloat((m / 1000 * v * v / 2).toFixed(2));
        const v02 = Math.sqrt((j * 2) / 0.0002).toFixed(0);
        
        document.getElementById('joules').innerText = j.toFixed(2);
        document.getElementById('m02').innerText = v02;

        if (isUserAction && (m !== lastW || v !== lastS)) {
            initAudio();
            playTick();
            lastW = m;
            lastS = v;
        }

        const st = document.getElementById('status-text');
        if (j <= 1.56) {
            st.innerHTML = "ВТОРИЧКА: ПИСТОЛЕТ, РЕВОЛЬВЕР — <span style='color:var(--green)'>0М</span>";
            st.style.color = "var(--green)";
        } else if (j > 1.56 && j <= 1.82) {
            st.innerHTML = "ОСНОВНОЕ (AEG/GAS) — <span style='color:var(--orange)'>10М</span>";
            st.style.color = "var(--orange)";
        } else if (j > 1.82 && j <= 2.25) {
            st.innerHTML = "ПУЛЕМЕТЫ (MG) — <span style='color:var(--cyan)'>20М</span>";
            st.style.color = "var(--cyan)";
        } else if (j > 2.25 && j <= 2.56) {
            st.innerHTML = "СТАНКОВЫЕ ПУЛЕМЕТЫ — <span style='color:var(--purple)'>30М</span>";
            st.style.color = "var(--purple)";
        } else if (j > 2.56 && j <= 3.00) {
            st.innerHTML = "СНАЙПЕРСКОЕ (ОДИНОЧКА) — <span style='color:white'>30М</span>";
            st.style.color = "white";
        } else {
            st.innerHTML = "НЕ ДОПУСК: К ИГРЕ НЕ ДОПУСКАЕТСЯ";
            st.style.color = "var(--red)";
        }
    }
    update();
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>
</body>
</html>
