<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Scorpion Calc</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1c1c1e; padding: 30px; border-radius: 25px; width: 300px; text-align: center; box-shadow: 0 0 20px rgba(0,255,0,0.1); border: 1px solid #333; }
        h2 { color: #ff9500; font-size: 22px; margin-bottom: 5px; text-transform: uppercase; }
        .sub { color: #8e8e93; font-size: 12px; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #2c2c2e; border: none; border-radius: 12px; color: #fff; font-size: 20px; text-align: center; outline: none; }
        button { width: 100%; padding: 15px; background: linear-gradient(180deg, #444, #222); border: 1px solid #444; border-radius: 12px; color: #fff; font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        button:active { background: #333; }
        .results { display: flex; justify-content: space-around; margin-top: 25px; }
        .res-box { background: #2c2c2e; padding: 15px; border-radius: 15px; width: 40%; }
        .val { display: block; font-size: 24px; font-weight: bold; color: #ff3b30; }
        .unit { font-size: 10px; color: #8e8e93; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <h2>СКОРПИОН</h2>
    <div class="sub">Страйкбольная команда (Сочи)</div>
    
    <input type="number" id="weight" step="0.01" placeholder="Вес шара (г)" value="0.30">
    <input type="number" id="speed" placeholder="Скорость (м/с)" value="120">
    
    <button onclick="calculate()">РАССЧИТАТЬ</button>
    
    <div class="results">
        <div class="res-box">
            <span class="val" id="j">2.16</span>
            <span class="unit">Джоуля</span>
        </div>
        <div class="res-box">
            <span class="val" id="ms02" style="color: #007aff;">147</span>
            <span class="unit">м/с (0.20г)</span>
        </div>
    </div>
    <div style="margin-top: 20px; font-size: 9px; color: #444;">SCORPION EDITION V1.2</div>
</div>

<script>
    function calculate() {
        const m = parseFloat(document.getElementById('weight').value);
        const v = parseFloat(document.getElementById('speed').value);
        if (m > 0 && v > 0) {
            const joules = (m / 1000 * v * v / 2).toFixed(2);
            const v02 = Math.sqrt((joules * 2) / 0.0002).toFixed(0);
            document.getElementById('j').innerText = joules;
            document.getElementById('ms02').innerText = v02;
        }
    }

    // Регистрация сервис-воркера для оффлайн работы
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
