<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ХРОН</title>
    <style>
        :root {
            --green: #00ff00;
            --red: #ff3b30;
            --blue: #007aff;
            --glass: rgba(18, 18, 18, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, sans-serif;
            background: black url('logo.png') no-repeat center;
            background-size: contain;
            color: white;
            overflow: hidden;
        }

        .container {
            width: 85%;
            max-width: 340px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 30px 20px;
            border-radius: 30px;
            border: 2px solid var(--green);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: var(--green);
            font-size: 28px;
            margin: 0 0 30px;
            text-transform: uppercase;
            letter-spacing: 8px;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .input-block { margin-bottom: 25px; text-align: left; }
        .label-row { display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--green); font-weight: bold; font-size: 14px; }

        /* Стиль самых первых удобных ползунков */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 5px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 26px;
            width: 26px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
            cursor: pointer;
            border: 2px solid white;
        }

        .results { display: flex; gap: 15px; margin-top: 20px; }
        .res-card {
            flex: 1;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 18px;
            border: 1px solid #444;
        }

        .val { display: block; font-size: 30px; font-weight: bold; }
        .j-color { color: var(--red); }
        .v-color { color: var(--blue); }
        .unit { font-size: 10px; color: #888; text-transform: uppercase; margin-top: 5px; font-weight: bold; }
        
        .footer { margin-top: 30px; font-size: 14px; color: #666; font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ХРОН</h1>

    <div class="input-block">
        <div class="label-row">
            <span>ВЕС ШAРА</span>
            <span id="w-val">0.30 г</span>
        </div>
        <input type="range" id="weight" min="0.12" max="0.50" step="0.01" value="0.30" oninput="update()">
    </div>

    <div class="input-block">
        <div class="label-row">
            <span>СКОРОСТЬ</span>
            <span id="s-val">120 м/с</span>
        </div>
        <input type="range" id="speed" min="50" max="200" step="1" value="120" oninput="update()">
    </div>

    <div class="results">
        <div class="res-card">
            <span class="val j-color" id="joules">2.16</span>
            <span class="unit">Джоуля</span>
        </div>
        <div class="res-card">
            <span class="val v-color" id="m02">147</span>
            <span class="unit">м/с (0.20г)</span>
        </div>
    </div>

    <div class="footer">СК СКОРПИОН 3.0</div>
</div>

<script>
    function update() {
        const m = document.getElementById('weight').value;
        const v = document.getElementById('speed').value;
        
        document.getElementById('w-val').innerText = m + ' г';
        document.getElementById('s-val').innerText = v + ' м/с';

        const j = (m / 1000 * v * v / 2).toFixed(2);
        const v02 = Math.sqrt((j * 2) / 0.0002).toFixed(0);

        document.getElementById('joules').innerText = j;
        document.getElementById('m02').innerText = v02;
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>
