<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ХРОН СКОРПИОН</title>
    <style>
        :root { 
            --silver: #c0c0c2; --red: #ff3b30; --blue: #007aff; 
            --dark-gray: #1c1c1e; --accent-red: #e30613;
        }
        
        body { 
            margin: 0; background: #000; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: -apple-system, sans-serif; overflow: hidden; color: white; 
            -webkit-user-select: none;
        }

        /* Контейнер для логотипа */
        .header-logo { 
            height: 22vh; /* Увеличил высоту для лучшей видимости */
            width: 90%; 
            background: url('logo.png') no-repeat center center; 
            background-size: contain; 
            margin: 20px 0 10px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
        }

        .app-title { font-size: 18px; font-weight: 900; letter-spacing: 12px; color: white; text-transform: uppercase; margin-bottom: 15px; }

        .quick-weight { display: flex; justify-content: space-between; gap: 6px; width: 92%; margin-bottom: 15px; }
        .weight-btn { 
            background: var(--dark-gray); border: 1px solid #333; color: var(--silver); 
            padding: 10px 0; flex: 1; border-radius: 10px; font-weight: bold; font-size: 11px; 
        }

        .container { width: 100%; background: #000; text-align: center; flex-grow: 1; display: flex; flex-direction: column; }

        .input-block { width: 92%; margin: 0 auto 35px; text-align: left; position: relative; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .label-name { font-size: 11px; color: #888; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; }
        .label-val { font-size: 24px; font-weight: 800; color: #fff; }
        
        input[type=range] { 
            -webkit-appearance: none; width: 100%; background: transparent; 
            outline: none; margin: 10px 0; position: relative; z-index: 10;
        }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 34px; width: 34px; border-radius: 50%; 
            background: #fff; border: 4px solid #000;
            box-shadow: 0 0 15px rgba(255,255,255,0.4); margin-top: -15px;
        }

        .ticks { 
            display: flex; justify-content: space-between; 
            width: 100%; padding: 0 17px; box-sizing: border-box;
            position: absolute; bottom: 20px; 
        }
        .ticks span { width: 1px; height: 8px; background: #333; }
        .ticks span.main { height: 16px; background: #fff; width: 1.5px; }

        .range-labels { display: flex; justify-content: space-between; padding: 0; margin-top: 12px; }
        .range-labels span { font-size: 10px; color: #555; font-weight: 600; width: 42px; text-align: center; }

        .status-box {
            width: 92%; margin: 0 auto 15px; background: var(--dark-gray); 
            border-radius: 12px; padding: 15px; border: 1px solid #333;
        }
        #status-text { font-size: 12px; font-weight: 800; text-transform: uppercase; }

        .results { display: flex; gap: 10px; width: 92%; margin: 0 auto; flex-grow: 1; padding-bottom: 20px; }
        .res-card { 
            flex: 1; background: var(--dark-gray); border-radius: 20px; 
            border: 1px solid #2c2c2e; display: flex; flex-direction: column; justify-content: center;
        }
        .val { display: block; font-size: 48px; font-weight: 900; line-height: 1; }
        .j-color { color: var(--accent-red); } 
        .v-color { color: #3498db; }
        .unit { font-size: 11px; color: #666; text-transform: uppercase; margin-top: 8px; font-weight: 800; }
    </style>
</head>
<body>
    <div class="header-logo"></div>
    <div class="app-title">ХРОН</div>
    
    <div class="quick-weight">
        <button class="weight-btn" onclick="setW(0.20)">0.20</button>
        <button class="weight-btn" onclick="setW(0.25)">0.25</button>
        <button class="weight-btn" onclick="setW(0.28)">0.28</button>
        <button class="weight-btn" onclick="setW(0.30)">0.30</button>
        <button class="weight-btn" onclick="setW(0.32)">0.32</button>
    </div>

    <div class="container">
        <div class="input-block">
            <div class="label-row"><span class="label-name">ВЕС ШАРА</span><span id="w-val" class="label-val">0.30 г</span></div>
            <div class="ticks" id="weight-ticks"></div>
            <input type="range" id="weight" min="0.20" max="0.45" step="0.01" value="0.30" oninput="update(true)">
            <div class="range-labels"><span>0.20</span><span>0.25</span><span>0.30</span><span>0.35</span><span>0.40</span><span>0.45</span></div>
        </div>

        <div class="input-block">
            <div class="label-row"><span class="label-name">СКОРОСТЬ</span><span id="s-val" class="label-val">120 м/с</span></div>
            <div class="ticks" id="speed-ticks"></div>
            <input type="range" id="speed" min="50" max="220" step="1" value="120" oninput="update(true)">
            <div class="range-labels"><span>50</span><span>85</span><span>120</span><span>155</span><span>190</span><span>220</span></div>
        </div>

        <div class="status-box">
            <div id="status-text">АНАЛИЗ...</div>
        </div>
        
        <div class="results">
            <div class="res-card"><span class="val j-color" id="joules">2.16</span><span class="unit">ДЖ</span></div>
            <div class="res-card"><span class="val v-color" id="m02">147</span><span class="unit">М/С (0.20)</span></div>
        </div>
    </div>

<script>
    let audioCtx = null;
    let lastW, lastS;

    const wTicks = document.getElementById('weight-ticks');
    for (let i = 20; i <= 45; i++) {
        const s = document.createElement('span');
        if (i % 5 === 0) s.className = 'main';
        wTicks.appendChild(s);
    }

    const sTicks = document.getElementById('speed-ticks');
    for (let i = 50; i <= 220; i++) {
        const s = document.createElement('span');
        if (i % 10 === 0) s.className = 'main';
        sTicks.appendChild(s);
    }

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTick() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
        g.gain.setValueAtTime(0.04, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.01);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.01);
    }

    function setW(v) { 
        initAudio(); document.getElementById('weight').value = v; 
        playTick(); update(); 
    }

    function update(isUser = false) {
        const m = document.getElementById('weight').value;
        const v = document.getElementById('speed').value;
        document.getElementById('w-val').innerText = m + ' г';
        document.getElementById('s-val').innerText = v + ' м/с';
        
        const j = (m / 1000 * v * v / 2).toFixed(2);
        const v02 = Math.sqrt((j * 2) / 0.0002).toFixed(0);
        
        document.getElementById('joules').innerText = j;
        document.getElementById('m02').innerText = v02;

        if (isUser && (m !== lastW || v !== lastS)) { initAudio(); playTick(); lastW = m; lastS = v; }

        const st = document.getElementById('status-text');
        if (j <= 1.56) { st.innerText = "ВТОРИЧКА (0М)"; st.style.color = "#2ecc71"; }
        else if (j <= 1.82) { st.innerText = "ОСНОВНОЕ AEG (10М)"; st.style.color = "#f39c12"; }
        else if (j <= 2.25) { st.innerText = "ПУЛЕМЕТ MG (20М)"; st.style.color = "#3498db"; }
        else if (j <= 3.00) { st.innerText = "СНАЙПЕР (30М)"; st.style.color = "#fff"; }
        else { st.innerText = "НЕ ДОПУСК"; st.style.color = "#e30613"; }
    }
    update();
</script>
</body>
</html>
