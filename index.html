<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Scorpion Tactical</title>
    <style>
        :root {
            --green: #00ff00;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }

        .container {
            width: 90%;
            max-width: 360px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 30px;
            border: 2px solid var(--green);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            text-align: center;
        }

        h1 { color: var(--green); font-size: 20px; margin: 10px 0 5px; text-transform: uppercase; letter-spacing: 2px; }
        .city { color: #555; font-size: 10px; margin-bottom: 20px; }

        .input-block { margin-bottom: 25px; text-align: left; }
        .label-row { display: flex; justify-content: space-between; margin-bottom: 10px; color: var(--green); font-weight: bold; }

        /* Стили ползунков */
        input[type=range] {
            width: 100%;
            -webkit-appearance: none;
            background: #333;
            height: 8px;
            border-radius: 5px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            cursor: pointer;
        }

        .results { display: flex; gap: 15px; margin-top: 20px; }
        .res-card {
            flex: 1;
            background: #222;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #333;
        }

        .val { display: block; font-size: 28px; font-weight: bold; color: var(--green); }
        .unit { font-size: 10px; color: #666; text-transform: uppercase; }
        
        .footer { margin-top: 20px; font-size: 9px; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>SCORPION TACTICAL</h1>
    <div class="city">СОЧИ</div>

    <div class="input-block">
        <div class="label-row">
            <span>ВЕС ШАРА</span>
            <span id="w-val">0.30 г</span>
        </div>
        <input type="range" id="weight" min="0.12" max="0.50" step="0.01" value="0.30" oninput="update()">
    </div>

    <div class="input-block">
        <div class="label-row">
            <span>СКОРОСТЬ</span>
            <span id="s-val">120 м/с</span>
        </div>
        <input type="range" id="speed" min="50" max="200" step="1" value="120" oninput="update()">
    </div>

    <div class="results">
        <div class="res-card">
            <span class="val" id="joules">2.16</span>
            <span class="unit">Джоуля</span>
        </div>
        <div class="res-card">
            <span class="val" id="m02" style="color: #007aff;">147</span>
            <span class="unit">м/с (0.20г)</span>
        </div>
    </div>

    <div class="footer">SCORPION EDITION V1.3 | OFFLINE READY</div>
</div>

<script>
    function update() {
        const m = document.getElementById('weight').value;
        const v = document.getElementById('speed').value;
        
        document.getElementById('w-val').innerText = m + ' г';
        document.getElementById('s-val').innerText = v + ' м/с';

        const j = (m / 1000 * v * v / 2).toFixed(2);
        const v02 = Math.sqrt((j * 2) / 0.0002).toFixed(0);

        document.getElementById('joules').innerText = j;
        document.getElementById('m02').innerText = v02;
    }

    // Регистрация оффлайн-режима
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>
