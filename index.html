<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>ХРОН СКОРПИОН</title>
    <style>
        :root { --silver: #c0c0c2; --red: #e30613; --blue: #0055a4; --green: #2ecc71; --orange: #f39c12; }
        
        body { 
            margin: 0; 
            background: #000; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: -apple-system, sans-serif; 
            overflow: hidden; 
            color: white; 
        }

        .spacer-top { height: 10px; }
        .header-logo { 
            height: 22vh; 
            width: 90%; 
            background: url('logo.png') no-repeat center center; 
            background-size: contain; 
            filter: drop-shadow(0 0 15px rgba(192, 192, 194, 0.4)); 
            margin-bottom: 5px;
        }

        .app-title { font-size: 20px; font-weight: 900; letter-spacing: 12px; color: white; text-transform: uppercase; margin-bottom: 10px; }

        .quick-weight { display: flex; justify-content: space-between; gap: 4px; width: 95%; margin-bottom: 12px; }
        .weight-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(192, 192, 194, 0.3); color: var(--silver); padding: 10px 0; flex: 1; border-radius: 8px; font-weight: bold; font-size: 11px; white-space: nowrap; text-align: center; }

        .container { 
            width: 95%; 
            background: #141414; 
            padding: 15px 15px 10px; 
            border-radius: 25px 25px 0 0; 
            border: 1px solid rgba(192, 192, 194, 0.2); 
            text-align: center; 
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .input-block { margin-bottom: 15px; text-align: left; }
        
        /* Увеличенные значения веса и скорости */
        .label-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; color: var(--silver); font-weight: bold; }
        .label-name { font-size: 11px; opacity: 0.8; letter-spacing: 1px; }
        .label-val { font-size: 22px; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        
        input[type=range] { -webkit-appearance: none; width: 100%; height: 8px; background: linear-gradient(to right, var(--red), var(--blue), #fff); border-radius: 4px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 30px; width: 30px; border-radius: 50%; background: var(--silver); border: 2px solid #000; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        .status-box {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px;
            margin: 5px 0;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed rgba(192,192,194,0.2);
        }
        #status-text { font-size: 12px; font-weight: bold; line-height: 1.3; text-transform: uppercase; }

        .results { display: flex; gap: 10px; flex-grow: 1; margin-top: 10px; margin-bottom: 10px; }
        .res-card { 
            flex: 1; 
            background: rgba(255,255,255,0.03); 
            border-radius: 15px; 
            border: 1px solid rgba(192, 192, 194, 0.1); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10px;
        }
        .val { display: block; font-size: 44px; font-weight: 900; line-height: 1; }
        .j-color { color: var(--red); } 
        .v-color { color: var(--blue); }
        .unit { font-size: 11px; color: var(--silver); text-transform: uppercase; opacity: 0.6; margin-top: 10px; font-weight: bold; }
        
        .footer { font-size: 8px; color: #444; letter-spacing: 3px; text-transform: uppercase; padding-bottom: 15px; }
    </style>
</head>
<body>
    <div class="spacer-top"></div>
    <div class="header-logo"></div>
    <div class="app-title">ХРОН</div>
    
    <div class="quick-weight">
        <button class="weight-btn" onclick="setW(0.20)">0.20</button>
        <button class="weight-btn" onclick="setW(0.25)">0.25</button>
        <button class="weight-btn" onclick="setW(0.28)">0.28</button>
        <button class="weight-btn" onclick="setW(0.30)">0.30</button>
        <button class="weight-btn" onclick="setW(0.32)">0.32</button>
    </div>

    <div class="container">
        <div>
            <div class="input-block">
                <div class="label-row"><span class="label-name">ВЕС ШАРА</span><span id="w-val" class="label-val">0.30 г</span></div>
                <input type="range" id="weight" min="0.12" max="0.50" step="0.01" value="0.30" oninput="update()">
            </div>
            <div class="input-block">
                <div class="label-row"><span class="label-name">СКОРОСТЬ</span><span id="s-val" class="label-val">120 м/с</span></div>
                <input type="range" id="speed" min="50" max="220" step="1" value="120" oninput="update()">
            </div>

            <div class="status-box">
                <div id="status-text">Замеряемся...</div>
            </div>
        </div>
        
        <div class="results">
            <div class="res-card">
                <span class="val j-color" id="joules">2.16</span>
                <span class="unit">Дж</span>
            </div>
            <div class="res-card">
                <span class="val v-color" id="m02">147</span>
                <span class="unit">м/с (0.20)</span>
            </div>
        </div>
        
        <div class="footer">СК СКОРПИОН 3.0</div>
    </div>

<script>
    function setW(v) { document.getElementById('weight').value = v; update(); }
    function update() {
        const m = document.getElementById('weight').value;
        const v = document.getElementById('speed').value;
        document.getElementById('w-val').innerText = m + ' г';
        document.getElementById('s-val').innerText = v + ' м/с';
        
        const j = (m / 1000 * v * v / 2).toFixed(2);
        const v02 = Math.sqrt((j * 2) / 0.0002).toFixed(0);
        
        document.getElementById('joules').innerText = j;
        document.getElementById('m02').innerText = v02;

        const st = document.getElementById('status-text');
        if (j <= 1.5) {
            st.innerHTML = "ВТОРИЧКА: ПИСТОЛЕТЫ, АВТОМАТЫ В ЗДАНИИ <span style='color:#2ecc71'>0М</span>";
            st.style.color = "#2ecc71";
        } else if (j > 1.5 && j <= 2.4) {
            st.innerHTML = "ОСНОВНОЕ: АВТОМАТ НА ОТКРЫТОЙ МЕСТНОСТИ <span style='color:#f39c12'>10М</span>";
            st.style.color = "#f39c12";
        } else if (j > 2.4 && j <= 3) {
            st.innerHTML = "СНАЙПЕРКА: ОДИНОЧНЫЙ ОГОНЬ <span style='color:#3498db'>30М</span>";
            st.style.color = "#3498db";
        } else {
            st.innerHTML = "НЕ ДОПУСК: К ИГРЕ НЕ ДОПУСКАЕТСЯ";
            st.style.color = "#e30613";
        }
    }
    update();
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>
</body>
</html>
